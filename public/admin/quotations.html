<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tất cả báo giá · Đại Lý Số</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/admin-shell.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 500:'#0a6fd6', 600:'#0858b3', 700:'#063f7a', 900:'#0b1f3a' } } } } };
    const user = Auth.guard('admin');
    document.addEventListener('DOMContentLoaded', () => { if (user) AdminShell.mount(user); });
  </script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-slate-50">
  <div id="admin-shell"></div>

  <main class="max-w-7xl mx-auto px-6 py-8" x-data="page()" x-init="load(); loadDealers()">
    <div class="flex items-center justify-between mb-6 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Tất cả báo giá</h2>
        <p class="text-sm text-slate-500 mt-0.5">View chéo toàn bộ báo giá của mọi đại lý trong hệ thống.</p>
      </div>
      <button @click="exportCSV()" class="text-sm bg-white border border-slate-300 hover:bg-slate-100 px-3 py-1.5 rounded-lg font-semibold">⬇ Export CSV</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl p-4 mb-4 grid grid-cols-2 md:grid-cols-5 gap-3">
      <input x-model="search" @input.debounce.400ms="load()" type="text"
             class="col-span-2 px-3 py-2 border border-slate-300 rounded-lg text-sm">
      <select x-model="filterStatus" @change="load()" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
        <option value="">Tất cả trạng thái</option>
        <option value="draft">Bản nháp</option>
        <option value="sent">Đã gửi</option>
        <option value="confirmed">Đã chốt</option>
        <option value="cancelled">Đã huỷ</option>
      </select>
      <select x-model="filterDealer" @change="load()" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
        <option value="">Tất cả đại lý</option>
        <template x-for="d in dealers" :key="d.id">
          <option :value="d.id" x-text="d.ten_dai_ly + ' (' + d.dealer_code + ')'"></option>
        </template>
      </select>
      <div class="flex gap-2">
        <input x-model="filterFrom" @change="load()" type="date" class="flex-1 px-2 py-2 border border-slate-300 rounded-lg text-xs" title="Từ ngày">
        <input x-model="filterTo" @change="load()" type="date" class="flex-1 px-2 py-2 border border-slate-300 rounded-lg text-xs" title="Đến ngày">
      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
          <tr>
            <th class="px-4 py-3 text-center font-semibold w-12">STT</th>
            <th class="px-4 py-3 text-left font-semibold">Số BG</th>
            <th class="px-4 py-3 text-left font-semibold">Ngày</th>
            <th class="px-4 py-3 text-left font-semibold">Đại lý</th>
            <th class="px-4 py-3 text-left font-semibold">Khách hàng</th>
            <th class="px-4 py-3 text-center font-semibold">TT BG</th>
            <th class="px-4 py-3 text-center font-semibold">TT ĐH</th>
            <th class="px-4 py-3 text-right font-semibold">Giá trị BG</th>
            <th class="px-4 py-3 text-right font-semibold">Thanh toán</th>
            <th class="px-4 py-3 text-right font-semibold">Công nợ</th>
            <th class="px-4 py-3 text-right font-semibold">Giá vốn</th>
            <th class="px-4 py-3 text-right font-semibold">Lợi nhuận</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <template x-for="(q, idx) in paginatedItems" :key="q.id">
            <tr class="hover:bg-slate-50">
              <td class="px-4 py-3 text-center text-xs text-slate-500 tabular-nums" x-text="(currentPage - 1) * perPage + idx + 1"></td>
              <td class="px-4 py-3 font-mono text-xs font-bold" x-text="q.so_bao_gia"></td>
              <td class="px-4 py-3 text-xs" x-text="Fmt.formatDate(q.ngay_bao_gia)"></td>
              <td class="px-4 py-3">
                <a :href="'/admin/dealer-detail.html?id=' + q.dealer_id" class="font-semibold text-slate-800 hover:text-brand-600 text-xs" x-text="q.ten_dai_ly"></a>
                <div class="text-[10px] text-slate-500 font-mono" x-text="q.dealer_code"></div>
              </td>
              <td class="px-4 py-3">
                <div class="text-slate-800 text-xs" x-text="q.customer_name || '—'"></div>
                <div class="text-[10px] text-slate-500 font-mono" x-text="q.ma_kh || ''"></div>
              </td>
              <td class="px-4 py-3 text-center">
                <span :class="statusClass(q.status)" x-text="statusLabel(q.status)" class="px-2 py-0.5 rounded text-[10px] font-semibold inline-block"></span>
              </td>
              <td class="px-4 py-3 text-center">
                <span x-show="q.order_status" :class="orderStatusClass(q.order_status)" x-text="orderStatusLabel(q.order_status)" class="px-2 py-0.5 rounded text-[10px] font-semibold inline-block"></span>
                <span x-show="!q.order_status" class="text-slate-400 text-xs">—</span>
              </td>
              <td class="px-4 py-3 text-right font-semibold tabular-nums text-xs" x-text="Fmt.formatMoney(q.tong_cong)"></td>
              <td class="px-4 py-3 text-right tabular-nums text-xs" x-text="Fmt.formatMoney(q.thanh_toan_thuc || 0)"></td>
              <td class="px-4 py-3 text-right tabular-nums text-xs" :class="(q.tong_cong - (q.thanh_toan_thuc || 0)) > 0 ? 'text-orange-700 font-semibold' : 'text-slate-500'" x-text="Fmt.formatMoney(q.tong_cong - (q.thanh_toan_thuc || 0))"></td>
              <td class="px-4 py-3 text-right tabular-nums text-xs" x-text="q.gia_von != null ? Fmt.formatMoney(q.gia_von) : '—'"></td>
              <td class="px-4 py-3 text-right tabular-nums text-xs font-semibold" :class="q.gia_von != null ? ((q.tong_cong - q.gia_von) > 0 ? 'text-green-700' : 'text-red-700') : 'text-slate-400'" x-text="q.gia_von != null ? Fmt.formatMoney(q.tong_cong - q.gia_von) : '—'"></td>
            </tr>
          </template>
          <tr x-show="!loading && items.length === 0">
            <td colspan="12" class="px-4 py-12 text-center text-slate-400">Không tìm thấy báo giá.</td>
          </tr>
          <tr x-show="loading">
            <td colspan="12" class="px-4 py-12 text-center text-slate-400">Đang tải...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Pagination -->
    <div x-show="!loading && items.length > 0" class="mt-4 flex items-center justify-between gap-4 flex-wrap bg-white border border-slate-200 rounded-xl px-4 py-3">
      <div class="text-sm text-slate-600">
        Trang <strong x-text="currentPage"></strong> / <strong x-text="totalPages"></strong>
        <span class="text-slate-400 ml-2">(<span x-text="items.length"></span> báo giá)</span>
      </div>
      <div class="flex gap-2">
        <button @click="currentPage = 1" :disabled="currentPage <= 1" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">⇤</button>
        <button @click="currentPage--" :disabled="currentPage <= 1" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">← Trước</button>
        <button @click="currentPage++" :disabled="currentPage >= totalPages" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">Sau →</button>
        <button @click="currentPage = totalPages" :disabled="currentPage >= totalPages" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">⇥</button>
      </div>
    </div>
  </main>

  <script>
    function page() {
      return {
        items: [], dealers: [], loading: false,
        search: '', filterStatus: '', filterDealer: '', filterFrom: '', filterTo: '',
        currentPage: 1, perPage: 20,
        Fmt: window.Fmt,
        get totalPages() { return Math.max(1, Math.ceil(this.items.length / this.perPage)); },
        get paginatedItems() { const s = (this.currentPage - 1) * this.perPage; return this.items.slice(s, s + this.perPage); },
        async load() {
          this.loading = true;
          this.currentPage = 1;
          try {
            const q = new URLSearchParams();
            if (this.search)       q.set('search', this.search);
            if (this.filterStatus) q.set('status', this.filterStatus);
            if (this.filterDealer) q.set('dealer_id', this.filterDealer);
            if (this.filterFrom)   q.set('from', this.filterFrom);
            if (this.filterTo)     q.set('to', this.filterTo);
            q.set('limit', 5000);
            const r = await API.get('/api/admin/all/quotations' + (q.toString() ? '?' + q : ''));
            this.items = r.data;
          } catch (e) { alert(e.message); }
          finally { this.loading = false; }
        },
        async loadDealers() {
          try { const r = await API.get('/api/admin/dealers'); this.dealers = r.data; } catch {}
        },
        statusLabel(s) { return ({ draft: 'Bản nháp', sent: 'Đã gửi', confirmed: 'Đã chốt', cancelled: 'Đã huỷ' })[s] || s; },
        statusClass(s) {
          return ({
            draft: 'bg-slate-100 text-slate-700',
            sent: 'bg-blue-100 text-blue-700',
            confirmed: 'bg-green-100 text-green-700',
            cancelled: 'bg-red-100 text-red-700',
          })[s] || 'bg-slate-100';
        },
        orderStatusLabel(s) {
          return ({ cho_san_xuat: 'Chờ SX', san_xuat: 'Sản xuất', lap_dat: 'Lắp đặt', hoan_thien: 'Hoàn thiện' })[s] || s || '';
        },
        orderStatusClass(s) {
          return ({
            cho_san_xuat: 'bg-amber-100 text-amber-800',
            san_xuat: 'bg-cyan-100 text-cyan-800',
            lap_dat: 'bg-orange-100 text-orange-800',
            hoan_thien: 'bg-emerald-100 text-emerald-800',
          })[s] || 'bg-slate-100';
        },
        async exportCSV() {
          try {
            const res = await fetch('/api/admin/export/quotations', { headers: { 'Authorization': 'Bearer ' + API.getToken() } });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `quotations-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 500);
          } catch (e) { alert(e.message); }
        },
      };
    }
  </script>
</body>
</html>
