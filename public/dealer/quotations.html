<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Báo giá · Đại Lý Số</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/dealer-shell.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 500:'#0a6fd6', 600:'#0858b3', 700:'#063f7a', 900:'#0b1f3a' } } } } };
    const user = Auth.guard('dealer');
    document.addEventListener('DOMContentLoaded', () => { if (user) DealerShell.mount(user); });
  </script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-slate-50">
  <div id="dealer-shell"></div>

  <main class="max-w-6xl mx-auto px-6 py-8" x-data="quotationsPage()" x-init="init()">
    <div class="flex items-center justify-between mb-6 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Báo giá</h2>
        <p class="text-sm text-slate-500 mt-0.5">Tạo, lưu, gửi báo giá cho khách hàng.</p>
      </div>
      <a href="/dealer/quotation-edit.html" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-semibold inline-block">
        + Tạo báo giá
      </a>
    </div>

    <!-- Banner filter KH (khi đến từ trang KH) -->
    <div x-show="filterCustomerObj" x-cloak class="bg-blue-50 border border-blue-200 text-blue-800 rounded-xl px-4 py-3 mb-4 flex items-center justify-between gap-3">
      <div class="text-sm">
        Đang lọc theo khách hàng:
        <strong x-text="filterCustomerObj?.ten_kh"></strong>
        (<span class="font-mono" x-text="filterCustomerObj?.ma_kh"></span>)
      </div>
      <button @click="clearCustomerFilter()" class="text-sm font-semibold text-blue-700 hover:underline">Bỏ lọc</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl p-4 mb-4 flex flex-wrap gap-3">
      <input x-model="search" @input.debounce.400ms="load()" type="text" placeholder="Tìm theo số BG / khách hàng / công trình..."
             class="flex-1 min-w-[200px] px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 text-sm">
      <select x-model="filterStatus" @change="load()" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
        <option value="">Tất cả trạng thái</option>
        <option value="draft">Bản nháp</option>
        <option value="sent">Đã gửi</option>
        <option value="confirmed">Đã xác nhận</option>
        <option value="cancelled">Đã huỷ</option>
      </select>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
          <tr>
            <th class="px-4 py-3 text-left font-semibold">Số BG</th>
            <th class="px-4 py-3 text-left font-semibold">Ngày</th>
            <th class="px-4 py-3 text-left font-semibold">Khách hàng</th>
            <th class="px-4 py-3 text-left font-semibold">Công trình</th>
            <th class="px-4 py-3 text-center font-semibold">Dòng SP</th>
            <th class="px-4 py-3 text-right font-semibold">Tổng cộng</th>
            <th class="px-4 py-3 text-center font-semibold">Trạng thái</th>
            <th class="px-4 py-3 text-right font-semibold">Thao tác</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <template x-for="q in quotations" :key="q.id">
            <tr class="hover:bg-slate-50">
              <td class="px-4 py-3 font-mono text-xs font-bold" x-text="q.so_bao_gia"></td>
              <td class="px-4 py-3" x-text="Fmt.formatDate(q.ngay_bao_gia)"></td>
              <td class="px-4 py-3">
                <div class="font-semibold text-slate-800" x-text="q.customer_name || '—'"></div>
                <div class="text-xs text-slate-500 font-mono" x-text="q.customer_code || ''"></div>
              </td>
              <td class="px-4 py-3 text-xs text-slate-600" x-text="q.dia_chi_cong_trinh || '—'"></td>
              <td class="px-4 py-3 text-center tabular-nums" x-text="q.items_count"></td>
              <td class="px-4 py-3 text-right font-semibold tabular-nums" x-text="Fmt.formatMoney(q.tong_cong)"></td>
              <td class="px-4 py-3 text-center">
                <span :class="statusClass(q.status)" x-text="statusLabel(q.status)" class="px-2 py-0.5 rounded text-xs font-semibold inline-block"></span>
              </td>
              <td class="px-4 py-3 text-right space-x-2">
                <a :href="'/dealer/quotation-edit.html?id=' + q.id" class="text-brand-600 hover:text-brand-700 text-sm font-semibold">Mở</a>
                <button x-show="q.status === 'draft'" @click="openMarkSent(q)" class="text-green-600 hover:text-green-700 text-sm font-semibold">Đã gửi</button>
                <button x-show="q.status === 'sent'" @click="confirmOrCancel(q, 'confirmed')" class="text-green-700 hover:text-green-800 text-sm font-semibold">KH chốt</button>
                <button x-show="q.status === 'sent'" @click="confirmOrCancel(q, 'cancelled')" class="text-orange-600 hover:text-orange-700 text-sm">KH huỷ</button>
                <button @click="cloneQuote(q)" class="text-slate-600 hover:text-slate-800 text-sm">Sao chép</button>
                <button @click="remove(q)" class="text-red-600 hover:text-red-700 text-sm">Xoá</button>
              </td>
            </tr>
          </template>
          <tr x-show="!loading && quotations.length === 0">
            <td colspan="8" class="px-4 py-12 text-center text-slate-400">Chưa có báo giá. Bấm "Tạo báo giá".</td>
          </tr>
          <tr x-show="loading">
            <td colspan="8" class="px-4 py-12 text-center text-slate-400">Đang tải...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Modal đánh dấu đã gửi -->
    <div x-show="sentOpen" x-cloak @keydown.escape.window="sentOpen=false"
         class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md" @click.outside="sentOpen=false">
        <div class="px-6 py-4 border-b border-slate-200">
          <h3 class="text-lg font-bold text-slate-800">Đánh dấu đã gửi</h3>
          <p class="text-sm text-slate-500 mt-0.5" x-text="`Báo giá ${sentTarget?.so_bao_gia}`"></p>
        </div>
        <div class="px-6 py-5 space-y-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Gửi qua *</label>
            <select x-model="sentForm.sent_method"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
              <option value="zalo">Zalo</option>
              <option value="email">Email</option>
              <option value="in_giay">In giấy đưa tận tay</option>
              <option value="khac">Khác</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Ghi chú (tùy chọn)</label>
            <textarea x-model="sentForm.sent_note" rows="2" placeholder="VD: Đã gửi qua Zalo lúc 14:30, KH hẹn phản hồi sáng mai"
                      class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 text-sm"></textarea>
          </div>
          <div x-show="error" x-cloak class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-3 py-2" x-text="error"></div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button @click="sentOpen=false" class="px-4 py-2 text-sm rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Huỷ</button>
          <button @click="submitMarkSent()" :disabled="saving"
                  class="px-4 py-2 text-sm rounded-lg bg-green-600 hover:bg-green-700 text-white font-semibold disabled:opacity-50">
            <span x-show="!saving">Xác nhận đã gửi</span>
            <span x-show="saving" x-cloak>Đang lưu...</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function quotationsPage() {
      return {
        quotations: [], loading: false, error: '', saving: false,
        search: '', filterStatus: '', filterCustomer: '', filterCustomerObj: null,
        sentOpen: false, sentTarget: null, sentForm: { sent_method: 'zalo', sent_note: '' },
        Fmt: window.Fmt,

        async init() {
          // Đọc query param ?customer_id=X từ trang KH chuyển sang
          const cid = new URLSearchParams(location.search).get('customer_id');
          if (cid) {
            this.filterCustomer = cid;
            try {
              const c = await API.get('/api/dealer/customers/' + cid);
              this.filterCustomerObj = c.data;
            } catch {}
          }
          await this.load();
        },
        clearCustomerFilter() {
          this.filterCustomer = '';
          this.filterCustomerObj = null;
          history.replaceState({}, '', '/dealer/quotations.html');
          this.load();
        },

        async load() {
          this.loading = true;
          try {
            const q = new URLSearchParams();
            if (this.search)         q.set('search', this.search);
            if (this.filterStatus)   q.set('status', this.filterStatus);
            if (this.filterCustomer) q.set('customer_id', this.filterCustomer);
            const res = await API.get('/api/dealer/quotations' + (q.toString() ? '?' + q : ''));
            this.quotations = res.data;
          } catch (e) { alert(e.message); }
          finally { this.loading = false; }
        },

        statusLabel(s) {
          return ({ draft: 'Bản nháp', sent: 'Đã gửi', confirmed: 'Đã xác nhận', cancelled: 'Đã huỷ' })[s] || s;
        },
        statusClass(s) {
          return ({
            draft: 'bg-slate-100 text-slate-700',
            sent: 'bg-blue-100 text-blue-700',
            confirmed: 'bg-green-100 text-green-700',
            cancelled: 'bg-red-100 text-red-700',
          })[s] || 'bg-slate-100 text-slate-700';
        },

        openMarkSent(q) {
          this.sentTarget = q;
          this.sentForm = { sent_method: 'zalo', sent_note: '' };
          this.error = '';
          this.sentOpen = true;
        },
        async submitMarkSent() {
          this.error = '';
          this.saving = true;
          try {
            await API.post('/api/dealer/quotations/' + this.sentTarget.id + '/mark-sent', this.sentForm);
            this.sentOpen = false;
            await this.load();
          } catch (e) { this.error = e.message; }
          finally { this.saving = false; }
        },

        async confirmOrCancel(q, newStatus) {
          const label = newStatus === 'confirmed' ? 'đã chốt' : 'đã huỷ';
          if (!confirm(`Xác nhận báo giá ${q.so_bao_gia} ${label}?`)) return;
          try {
            await API.patch('/api/dealer/quotations/' + q.id + '/status', { status: newStatus });
            await this.load();
          } catch (e) { alert(e.message); }
        },

        async cloneQuote(q) {
          if (!confirm(`Tạo bản sao của ${q.so_bao_gia}?`)) return;
          try {
            const res = await API.post('/api/dealer/quotations/' + q.id + '/clone', {});
            window.location.href = '/dealer/quotation-edit.html?id=' + res.data.id;
          } catch (e) { alert(e.message); }
        },

        async remove(q) {
          if (!confirm(`Xoá báo giá ${q.so_bao_gia}?`)) return;
          try { await API.delete('/api/dealer/quotations/' + q.id); await this.load(); }
          catch (e) { alert(e.message); }
        },
      };
    }
  </script>
</body>
</html>
